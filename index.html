<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un regalo para vos</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrap">
    <section class="access-screen active" id="accessScreen">
      <div class="access-card">
        <div class="sparkle"></div>
        <h1>Un regalo para vos</h1>
        <p class="intro-text">Ingresá la clave para abrir este recuerdo</p>

        <div class="input-group">
          <input id="accessInput" type="password" placeholder="Escribí la clave aquí" autocomplete="off" aria-label="Clave de acceso">
          <button id="openBookBtn" type="button">Abrir libro</button>
        </div>

        <p class="error-message" id="errorMessage" aria-live="polite"></p>
      </div>
    </section>

    <section class="book-screen" id="bookScreen" aria-hidden="true">
      <div class="book-header">
        <div>
          <span class="label">Libro de recuerdos</span>
          <h2>Para vos, mi amor</h2>
        </div>
        <div class="page-counter" id="pageCounter">Página 1 de 10</div>
      </div>

      <div class="book-frame">
        <div class="book-page page-transition" id="bookPage">
          <div class="page-image">
            <img id="pageImage" src="assets/images/foto1.jpg" alt="Foto de recuerdo 1">
          </div>
          <div class="page-text">
            <p id="pageText"></p>
          </div>
        </div>
      </div>

      <div class="book-actions">
        <button id="prevBtn" class="nav-btn disabled" type="button" disabled>Anterior</button>
        <button id="nextBtn" class="nav-btn" type="button">Siguiente</button>
        <button id="restartBtn" class="restart-btn hidden" type="button">Volver a leer</button>
        <button id="downloadPdfBtn" class="restart-btn download-btn hidden" type="button">Descargar PDF</button>
      </div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js" integrity="sha512-BNa5SxI/jkK+j3a6Eh+VFt6Xx8UoPxNRqUnm63QKYVkvXSkd+oA4Msr03Vt+xh4WeZLx3HqJ0GcwVxwR3w7LRQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js" integrity="sha512-5GWoWSCcABMptsi88XYNaC2Umjv0yZAP2O8OBxG0eGwB2cM8TwXOC+Q8o2sXR0DX1W6YQd1kznjgjaQ9+mLJMg==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  
  <script>
    // Verificar que las librerías se carguen correctamente
    let libsLoaded = false;
    
    const verificarLibs = setInterval(() => {
      if (window.html2canvas && window.jspdf) {
        console.log('✅ Librerías externas cargadas correctamente');
        libsLoaded = true;
        clearInterval(verificarLibs);
      }
    }, 100);
    
    // Timeout para verificación
    setTimeout(() => {
      if (!libsLoaded) {
        console.warn('⚠️ Librerías externas tardando en cargar. Intenta recargar la página si hay problemas.');
      }
    }, 5000);
  </script>
  
  <script src="pdf-download.js"></script>
  <script src="script.js"></script>
</body>
</html>
