<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Un regalo para vos</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="page-wrap">
    <section class="access-screen active" id="accessScreen">
      <div class="access-card">
        <div class="sparkle"></div>
        <h1>Un regalo para vos</h1>
        <p class="intro-text">Ingresá la clave para abrir este recuerdo</p>

        <div class="input-group">
          <input id="accessInput" type="password" placeholder="Escribí la clave aquí" autocomplete="off" aria-label="Clave de acceso">
          <button id="openBookBtn" type="button">Abrir libro</button>
        </div>

        <p class="error-message" id="errorMessage" aria-live="polite"></p>
      </div>
    </section>

    <section class="book-screen" id="bookScreen" aria-hidden="true">
      <div class="book-header">
        <span class="label">Libro de recuerdos</span>
        <div class="page-counter" id="pageCounter">Página 1 de 10</div>
      </div>

      <div class="book-frame">
        <div class="book-page page-transition" id="bookPage">
          <div class="page-image">
            <img id="pageImage" src="assets/images/foto1.jpg" alt="Foto de recuerdo 1">
          </div>
          <div class="page-text">
            <p id="pageText"></p>
          </div>
        </div>
      </div>

      <div class="book-actions">
        <button id="prevBtn" class="nav-btn disabled" type="button" disabled>Anterior</button>
        <button id="nextBtn" class="nav-btn" type="button">Siguiente</button>
        <button id="restartBtn" class="restart-btn hidden" type="button">Volver a leer</button>
        <button id="downloadPdfBtn" class="restart-btn download-btn locked" type="button" disabled>🔒 PDF (pág. 1/10)</button>
      </div>
    </section>
  </div>

  <!-- Múltiples opciones de CDN para máxima confiabilidad -->
  <!-- html2canvas - jsDelivr (opción principal) -->
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  
  <!-- html2canvas - Alternativa unpkg -->
  <script>
    if (!window.html2canvas) {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/html2canvas@1.4.1/dist/html2canvas.js';
      document.head.appendChild(script);
    }
  </script>

  <!-- jsPDF - jsDelivr (opción principal) -->
  <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
  
  <!-- jsPDF - Alternativa unpkg -->
  <script>
    if (!window.jspdf) {
      const script = document.createElement('script');
      script.src = 'https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js';
      document.head.appendChild(script);
    }
  </script>

  <script>
    // Sistema avanzado de verificación de librerías
    window.pdfLibsStatus = {
      html2canvas: false,
      jsPDF: false,
      attempts: 0,
      maxAttempts: 60
    };

    const verificarLibrerias = () => {
      window.pdfLibsStatus.attempts++;
      
      if (window.html2canvas) {
        window.pdfLibsStatus.html2canvas = true;
      }
      if (window.jspdf?.jsPDF) {
        window.pdfLibsStatus.jsPDF = true;
      }

      if (window.pdfLibsStatus.html2canvas && window.pdfLibsStatus.jsPDF) {
        console.log('✅ Todas las librerías cargadas exitosamente en intento', window.pdfLibsStatus.attempts);
        return true;
      }

      if (window.pdfLibsStatus.attempts >= window.pdfLibsStatus.maxAttempts) {
        console.warn('⚠️ Librerías no cargadas después de 6 segundos. Usando alternativa fallback.');
        window.pdfLibsStatus.useFallback = true;
        return false;
      }

      return false;
    };

    // Verificar cada 100ms
    const intervalo = setInterval(() => {
      if (verificarLibrerias()) {
        clearInterval(intervalo);
      }
    }, 100);

    // Fallback: establecer función para usar librerias locales o API
    window.pdfDownloadFallback = {
      generatePdfViaScreenshot: async function(pages, fileName) {
        console.log('🔄 Usando modo fallback para PDF...');
        alert('⚠️ Generando PDF en modo optimizado (puede tardar más). Por favor espera...');
        
        // Aquí se implementaría solución alternativa
        return new Promise((resolve, reject) => {
          reject(new Error('Modo fallback no implementado aún'));
        });
      }
    };
  </script>

  <script src="pdf-download.js"></script>
  <script src="script.js"></script>
</body>
</html>
